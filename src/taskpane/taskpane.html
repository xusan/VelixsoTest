<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Velixo Task Pane</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .group { border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        label { display: block; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Settings</h3>
    <div class="group">
        <p>Orientation:</p>
        <label><input type="radio" name="mode" value="row" id="rowBtn"> Row (Horizontal)</label>
        <label><input type="radio" name="mode" value="column" id="colBtn"> Column (Vertical)</label>
    </div>
</body>
</html>
